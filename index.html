
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#game { display: flex; flex-direction: column; align-items: center; padding: 24px 16px; min-height: 600px; }
h2.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
#title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; text-align: center; }
#subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 20px; text-align: center; }
#score-bar { display: flex; gap: 20px; margin-bottom: 16px; }
.score-item { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 18px; text-align: center; }
.score-label { font-size: 12px; color: var(--color-text-secondary); }
.score-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
#instructions { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 18px; text-align: center; max-width: 420px; line-height: 1.5; }
#canvas-wrap { position: relative; width: 320px; height: 420px; }
canvas { border-radius: var(--border-radius-lg); }
#controls { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 18px; width: 320px; }
.ctrl-row { display: flex; gap: 10px; align-items: center; width: 100%; }
.ctrl-label { font-size: 13px; color: var(--color-text-secondary); width: 80px; text-align: right; }
input[type=range] { flex: 1; }
.ctrl-val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); width: 44px; }
#open-btn { margin-top: 4px; padding: 10px 32px; font-size: 15px; font-weight: 500; background: var(--color-background-primary); border: 1.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-primary); transition: background 0.15s; }
#open-btn:hover { background: var(--color-background-secondary); }
#open-btn:active { transform: scale(0.97); }
#result-msg { min-height: 28px; font-size: 15px; font-weight: 500; text-align: center; margin-top: 8px; }
#restart-btn { display: none; padding: 8px 24px; font-size: 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); cursor: pointer; color: var(--color-text-primary); margin-top: 4px; }
#restart-btn:hover { background: var(--color-background-primary); }
</style>

<div id="game">
  <h2 class="sr-only">Gra Bidon: ustaw butelkę prawidłowo i odkręć nakrętkę, żeby się nie oblać wodą.</h2>
  <div id="title">💧 Bidon</div>
  <div id="subtitle">Odkręć nakrętkę tak, żeby się nie oblać</div>
  <div id="score-bar">
    <div class="score-item"><div class="score-label">Rekord</div><div class="score-val" id="best-score">0</div></div>
    <div class="score-item"><div class="score-label">Sucha seria</div><div class="score-val" id="streak">0</div></div>
    <div class="score-item"><div class="score-label">Poziom</div><div class="score-val" id="level-disp">1</div></div>
  </div>
  <div id="instructions">ВUstaw kąt nachylenia i pozycję słomki, następnie naciśnij „Otwórz nakrętkę"</div>
  <canvas id="c" width="320" height="420"></canvas>
  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Nachylenie</span>
      <input type="range" id="angle" min="-80" max="80" value="0" step="1">
      <span class="ctrl-val" id="angle-val">0°</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Słomka</span>
      <input type="range" id="straw" min="0" max="100" value="50" step="1">
      <span class="ctrl-val" id="straw-val">50</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Nakrętka</span>
      <input type="range" id="cap" min="0" max="100" value="50" step="1">
      <span class="ctrl-val" id="cap-val">50</span>
    </div>
    <button id="open-btn">Otwórz nakrętkę 🔓</button>
    <div id="result-msg"></div>
    <button id="restart-btn">Jeszcze raz ↻</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 320, H = 420;

let angle = 0, straw = 50, cap = 50;
let opened = false, splashing = false, splashFrames = 0;
let streak = 0, best = 0, level = 1;
let particles = [];
let animFrame = null;
let targetAngle, targetStraw, targetCap, tolerance;

function randomLevel() {
  tolerance = Math.max(8, 28 - level * 2);
  targetAngle = Math.round((Math.random() * 120 - 60));
  targetStraw = Math.round(Math.random() * 80 + 10);
  targetCap = Math.round(Math.random() * 80 + 10);
}

randomLevel();

function drawBottle(tAngle, tStraw, tCap, isOpen, splash) {
  ctx.save();
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2 + 20;
  const bodyW = 70, bodyH = 180, neckW = 28, neckH = 50;

  ctx.translate(cx, cy);
  ctx.rotate((tAngle * Math.PI) / 180);

  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const bottleBody = isDark ? '#2a4a6b' : '#b8deff';
  const bottleStroke = isDark ? '#4a8abf' : '#378add';
  const waterColor = isDark ? 'rgba(56,140,220,0.55)' : 'rgba(55,138,221,0.45)';
  const capColor = splash ? '#e24b4a' : (isDark ? '#888' : '#555');
  const capStroke = isDark ? '#aaa' : '#333';
  const strawColor = isDark ? '#ffcf75' : '#ba7517';

  const waterLevel = 0.65;

  ctx.beginPath();
  ctx.roundRect(-bodyW/2, -bodyH/2, bodyW, bodyH, 10);
  ctx.fillStyle = bottleBody;
  ctx.fill();
  ctx.strokeStyle = bottleStroke;
  ctx.lineWidth = 2;
  ctx.stroke();

  const wy = -bodyH/2 + bodyH * (1 - waterLevel);
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(-bodyW/2, -bodyH/2, bodyW, bodyH, 10);
  ctx.clip();
  ctx.fillStyle = waterColor;
  ctx.fillRect(-bodyW/2, wy, bodyW, bodyH);
  ctx.restore();

  ctx.fillStyle = bottleBody;
  ctx.fillRect(-neckW/2, -bodyH/2 - neckH, neckW, neckH + 4);
  ctx.strokeStyle = bottleStroke;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-neckW/2, -bodyH/2 - neckH, neckW, neckH + 4);

  const strawX = -neckW/2 + (tStraw / 100) * neckW;
  const clampedStrawX = Math.max(-neckW/2 + 3, Math.min(neckW/2 - 3, strawX - neckW/2));
  ctx.beginPath();
  ctx.moveTo(clampedStrawX, -bodyH/2 - neckH - 18);
  ctx.lineTo(clampedStrawX, -bodyH/2 + 80);
  ctx.strokeStyle = strawColor;
  ctx.lineWidth = 3;
  ctx.setLineDash([5, 3]);
  ctx.stroke();
  ctx.setLineDash([]);

  const capOffset = isOpen ? -16 : 0;
  const capX = -neckW/2 - 4 + (tCap / 100) * (neckW + 8) - neckW/2;
  ctx.fillStyle = capColor;
  ctx.strokeStyle = capStroke;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-neckW/2 - 4, -bodyH/2 - neckH - 14 + capOffset, neckW + 8, 18, 4);
  ctx.fill();
  ctx.stroke();

  if (splash && particles.length > 0) {
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(55,138,221,${p.a})`;
      ctx.fill();
    });
  }

  ctx.restore();
}

function spawnParticles(good) {
  particles = [];
  if (good) return;
  for (let i = 0; i < 28; i++) {
    const spd = 2 + Math.random() * 4;
    const dir = Math.random() * Math.PI * 2;
    particles.push({
      x: (Math.random() - 0.5) * 30,
      y: -(H / 2 + 20) + 80 + (Math.random() - 0.5) * 40,
      vx: Math.cos(dir) * spd,
      vy: Math.sin(dir) * spd - 3,
      r: 3 + Math.random() * 4,
      a: 0.8
    });
  }
}

function animateSplash() {
  splashFrames++;
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.a -= 0.018;
  });
  particles = particles.filter(p => p.a > 0);
  drawBottle(angle, straw, cap, true, true);
  if (splashFrames < 80) {
    animFrame = requestAnimationFrame(animateSplash);
  } else {
    splashing = false;
  }
}

function draw() {
  drawBottle(angle, straw, cap, opened, false);
}

document.getElementById('angle').addEventListener('input', e => {
  angle = parseInt(e.target.value);
  document.getElementById('angle-val').textContent = angle + '°';
  if (!opened) draw();
});
document.getElementById('straw').addEventListener('input', e => {
  straw = parseInt(e.target.value);
  document.getElementById('straw-val').textContent = straw;
  if (!opened) draw();
});
document.getElementById('cap').addEventListener('input', e => {
  cap = parseInt(e.target.value);
  document.getElementById('cap-val').textContent = cap;
  if (!opened) draw();
});

document.getElementById('open-btn').addEventListener('click', () => {
  if (opened) return;
  opened = true;
  document.getElementById('open-btn').disabled = true;

  const angleDiff = Math.abs(angle - targetAngle);
  const strawDiff = Math.abs(straw - targetStraw);
  const capDiff = Math.abs(cap - targetCap);
  const perfect = angleDiff <= tolerance && strawDiff <= tolerance && capDiff <= tolerance;
  const partial = angleDiff <= tolerance * 2 && strawDiff <= tolerance * 2 && capDiff <= tolerance * 2;

  const msg = document.getElementById('result-msg');
  const restart = document.getElementById('restart-btn');

  if (perfect) {
    streak++;
    if (streak > best) { best = streak; document.getElementById('best-score').textContent = best; }
    level = Math.min(10, Math.floor(streak / 2) + 1);
    msg.style.color = 'var(--color-text-success)';
    msg.textContent = '✅ Sucho! Świetnie otworzyłaś! +' + streak + ' seria';
    draw();
  } else if (partial) {
    streak = 0;
    msg.style.color = 'var(--color-text-warning)';
    msg.textContent = '🌊 Trochę prysnęło… prawie!';
    splashing = true;
    splashFrames = 0;
    spawnParticles(false);
    animateSplash();
  } else {
    streak = 0;
    msg.style.color = 'var(--color-text-danger)';
    msg.textContent = '💦 Oblałeś się! Woda wszędzie!';
    splashing = true;
    splashFrames = 0;
    spawnParticles(false);
    animateSplash();
  }

  document.getElementById('streak').textContent = streak;
  document.getElementById('level-disp').textContent = level;
  restart.style.display = 'inline-block';
});

document.getElementById('restart-btn').addEventListener('click', () => {
  opened = false;
  splashing = false;
  splashFrames = 0;
  particles = [];
  if (animFrame) cancelAnimationFrame(animFrame);

  angle = 0; straw = 50; cap = 50;
  document.getElementById('angle').value = 0;
  document.getElementById('straw').value = 50;
  document.getElementById('cap').value = 50;
  document.getElementById('angle-val').textContent = '0°';
  document.getElementById('straw-val').textContent = '50';
  document.getElementById('cap-val').textContent = '50';
  document.getElementById('open-btn').disabled = false;
  document.getElementById('result-msg').textContent = '';
  document.getElementById('restart-btn').style.display = 'none';
  randomLevel();
  draw();
});

draw();
</script>
